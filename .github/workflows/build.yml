name: build em-dosbox (memory-fixed)
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool pkg-config build-essential
      - name: emsdk
        uses: mymindstorm/setup-emsdk@v14
      - name: clone em-dosbox (js-dos)
        run: git clone --depth 1 https://github.com/js-dos/dosbox.git src-emdosbox
      - name: fake sdl-config (SDL1 + memory growth přes emscripten port)
        run: |
          mkdir -p $HOME/fakebin
          cat > $HOME/fakebin/sdl-config <<'EOF'
          #!/bin/bash
          case "$1" in
            --version) echo 1.2.15 ;;
            --cflags)  echo "-s USE_SDL=1" ;;
            --libs)    echo "-s USE_SDL=1 -s ALLOW_MEMORY_GROWTH=1" ;;
            --prefix)  echo "$HOME/fakebin" ;;
            *) ;;
          esac
          EOF
          chmod +x $HOME/fakebin/sdl-config
          echo "$HOME/fakebin" >> $GITHUB_PATH
      - name: configure + build (wasm + SDL1 + memory growth)
        continue-on-error: true
        run: |
          cd src-emdosbox
          export SDL_CONFIG="$HOME/fakebin/sdl-config"
          ./autogen.sh
          emconfigure ./configure --enable-wasm SDL_CONFIG="$HOME/fakebin/sdl-config" 2>&1 | tail -25
          echo "=== MAKE ==="
          emmake make -j2 EMCC_CFLAGS="-s USE_SDL=1 -s ALLOW_MEMORY_GROWTH=1" 2>&1 | tail -80
      - name: list outputs
        run: |
          cd src-emdosbox && echo "=== .js/.wasm v src ===" && ls -la src/*.js src/*.wasm 2>/dev/null || echo "zatim nic"
      - name: artifact
        uses: actions/upload-artifact@v4
        with:
          name: emdosbox-out
          path: |
            src-emdosbox/src/*.wasm
            src-emdosbox/src/*.js
          if-no-files-found: warn
