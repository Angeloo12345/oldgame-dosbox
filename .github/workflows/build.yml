name: build em-dosbox (memory-fixed)
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: deps
        run: sudo apt-get update && sudo apt-get install -y autoconf automake libtool pkg-config build-essential
      - name: emsdk
        uses: mymindstorm/setup-emsdk@v14
      - name: prebuild SDL1 port
        run: embuilder build sdl || embuilder build libsdl || echo "(embuilder sdl skip)"
      - name: clone em-dosbox (js-dos)
        run: git clone --depth 1 https://github.com/js-dos/dosbox.git src-emdosbox
      - name: patch configure.ac (vyřadit AC_MSG_ERROR Only libSDL 1.2.X)
        run: |
          cd src-emdosbox
          sed -i 's/AC_MSG_ERROR(\[Only libSDL 1.2.X supported\])/AC_MSG_RESULT([forced-ok])/' configure.ac
          echo "=== po patchi (kontrola) ==="; grep -n "1.2.X" configure.ac | head
      - name: fake sdl-config (SDL1 + memory growth)
        run: |
          mkdir -p $HOME/fakebin
          cat > $HOME/fakebin/sdl-config <<'EOF'
          #!/bin/bash
          case "$1" in
            --version) echo 1.2.15 ;;
            --cflags)  echo "-sUSE_SDL=1" ;;
            --libs)    echo "-sUSE_SDL=1 -sALLOW_MEMORY_GROWTH=1" ;;
            --prefix)  echo "$HOME/fakebin" ;;
            *) ;;
          esac
          EOF
          chmod +x $HOME/fakebin/sdl-config
          echo "$HOME/fakebin" >> $GITHUB_PATH
      - name: configure + build
        continue-on-error: true
        run: |
          cd src-emdosbox
          export SDL_CONFIG="$HOME/fakebin/sdl-config"
          ./autogen.sh
          emconfigure ./configure --enable-wasm SDL_CONFIG="$HOME/fakebin/sdl-config" CPPFLAGS="-sUSE_SDL=1" 2>&1 | tail -20
          echo "=== MAKE ==="
          emmake make -j2 CXXFLAGS="-O2 -sUSE_SDL=1" LDFLAGS="-sUSE_SDL=1 -sALLOW_MEMORY_GROWTH=1" 2>&1 | tail -90
      - name: list outputs
        run: cd src-emdosbox && (ls -la src/*.js src/*.wasm 2>/dev/null || echo "zatim nic")
      - name: artifact
        uses: actions/upload-artifact@v4
        with:
          name: emdosbox-out
          path: |
            src-emdosbox/src/*.wasm
            src-emdosbox/src/*.js
          if-no-files-found: warn
